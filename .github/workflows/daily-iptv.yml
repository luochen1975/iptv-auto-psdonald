name: 每日抓取港澳台IPTV直播源

on:
  schedule:
    # 每天 UTC 0:10 (北京时间 8:10) 执行
    - cron: '10 0 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper (with validation)
        run: python scraper.py --output-dir output --timeout 8 --workers 20

      - name: Generate result summary
        run: |
          echo "## IPTV 直播源抓取结果" >> $GITHUB_STEP_SUMMARY
          echo "**时间**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f output/hk.json ]; then
            python3 -c "
          import json
          with open('output/hk.json') as f:
              d = json.load(f)
          s = d['stats']
          print(f'- 原始频道: {s.get(\"total_raw\", 0)}')
          print(f'- 去重后: {s.get(\"total_unique\", 0)}')
          print(f'- 可播: {s.get(\"alive\", 0)}')
          print(f'- 不可播: {s.get(\"dead\", 0)}')
          print(f'- 已验证: {s.get(\"validated\", False)}')
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            TZ='Asia/Shanghai' date '+%Y-%m-%d' > output/.last-update
            git add output/.last-update
            git commit -m "auto: update IPTV sources $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
            git push
          fi
